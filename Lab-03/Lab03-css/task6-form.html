<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 6 - Form Styling</title>
  <link rel="stylesheet" href="styles/task6.css">
</head>
<body>

  <div class="page-wrapper">

    <header>
      <h1>Create Account</h1>
      <p>Fill in the details below to register</p>
    </header>

    <form class="registration-form">

      <!-- Name Row -->
      <div class="form-row">
        <div class="form-group">
          <label for="fname">First Name</label>
          <input type="text" id="fname" placeholder="Enter first name">
          <span class="error-msg">First name is required</span>
        </div>
        <div class="form-group">
          <label for="lname">Last Name</label>
          <input type="text" id="lname" placeholder="Enter last name">
          <span class="error-msg">Last name is required</span>
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email">
        <span class="error-msg">Please enter a valid email</span>
        <span class="success-msg">Email looks good!</span>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create a password">
        <span class="hint-msg">Minimum 8 characters</span>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="Repeat your password">
        <span class="error-msg">Passwords do not match</span>
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="+92 300 0000000">
      </div>

      <!-- Dropdown -->
      <div class="form-group">
        <label for="course">Select Course</label>
        <select id="course">
          <option value="">-- Choose a course --</option>
          <option value="cs">Computer Science</option>
          <option value="se">Software Engineering</option>
          <option value="it">Information Technology</option>
          <option value="ai">Artificial Intelligence</option>
        </select>
      </div>

      <!-- Gender -->
      <div class="form-group">
        <label>Gender</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="gender" value="male"> Male
          </label>
          <label class="radio-label">
            <input type="radio" name="gender" value="female"> Female
          </label>
          <label class="radio-label">
            <input type="radio" name="gender" value="other"> Other
          </label>
        </div>
      </div>

      <!-- Interests -->
      <div class="form-group">
        <label>Interests</label>
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox"> Web Development
          </label>
          <label class="checkbox-label">
            <input type="checkbox"> Mobile Apps
          </label>
          <label class="checkbox-label">
            <input type="checkbox"> Data Science
          </label>
          <label class="checkbox-label">
            <input type="checkbox"> Cybersecurity
          </label>
        </div>
      </div>

      <!-- Message -->
      <div class="form-group">
        <label for="message">About Yourself</label>
        <textarea id="message" rows="4" 
        placeholder="Tell us a little about yourself..."></textarea>
      </div>

      <!-- Terms -->
      <div class="form-group terms-group">
        <label class="checkbox-label">
          <input type="checkbox"> I agree to the
          <a href="#">Terms and Conditions</a>
        </label>
      </div>

      <!-- Buttons -->
      <div class="form-buttons">
        <button type="reset" class="btn-reset">Reset</button>
        <button type="submit" class="btn-submit">Create Account</button>
      </div>

      <!-- Success Message -->
      <div class="success-banner">
        ✅ Account created successfully! Welcome aboard!
      </div>

    </form>
  </div>

</body>
</html>
