<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 5 - Button Styling Collection</title>
  <link rel="stylesheet" href="styles/task5.css">
</head>
<body>

  <header>
    <h1>Button Styling Collection</h1>
    <p>Hover over buttons to see transition effects</p>
  </header>

  <!-- 1. Sizes -->
  <section>
    <h2>Different Sizes</h2>
    <div class="btn-row">
      <button class="btn btn-xs">Extra Small</button>
      <button class="btn btn-sm">Small</button>
      <button class="btn btn-md">Medium</button>
      <button class="btn btn-lg">Large</button>
      <button class="btn btn-xl">Extra Large</button>
    </div>
  </section>

  <!-- 2. Colors -->
  <section>
    <h2>Different Colors</h2>
    <div class="btn-row">
      <button class="btn btn-primary">Primary</button>
      <button class="btn btn-success">Success</button>
      <button class="btn btn-danger">Danger</button>
      <button class="btn btn-warning">Warning</button>
      <button class="btn btn-info">Info</button>
      <button class="btn btn-dark">Dark</button>
    </div>
  </section>

  <!-- 3. Shapes -->
  <section>
    <h2>Different Shapes</h2>
    <div class="btn-row">
      <button class="btn btn-primary btn-square">Square</button>
      <button class="btn btn-success btn-rounded">Rounded</button>
      <button class="btn btn-danger btn-pill">Pill Shape</button>
      <button class="btn btn-warning btn-circle">●</button>
      <button class="btn btn-info btn-outline-primary">Outline</button>
    </div>
  </section>

  <!-- 4. Hover and Focus States -->
  <section>
    <h2>Hover and Focus States</h2>
    <div class="btn-row">
      <button class="btn btn-hover-fill">Fill on Hover</button>
      <button class="btn btn-hover-lift">Lift on Hover</button>
      <button class="btn btn-hover-slide">Slide Effect</button>
      <button class="btn btn-hover-bounce">Bounce</button>
    </div>
  </section>

  <!-- 5. Transitions -->
  <section>
    <h2>Transition Effects</h2>
    <div class="btn-row">
      <button class="btn btn-trans-color">Color Change</button>
      <button class="btn btn-trans-scale">Scale Up</button>
      <button class="btn btn-trans-rotate">Rotate</button>
      <button class="btn btn-trans-shadow">Shadow Grow</button>
    </div>
  </section>

  <!-- 6. Gradient Backgrounds -->
  <section>
    <h2>Gradient Backgrounds</h2>
    <div class="btn-row">
      <button class="btn btn-grad-1">Sunset</button>
      <button class="btn btn-grad-2">Ocean</button>
      <button class="btn btn-grad-3">Forest</button>
      <button class="btn btn-grad-4">Candy</button>
    </div>
  </section>

  <!-- 7. Disabled State -->
  <section>
    <h2>Disabled State</h2>
    <div class="btn-row">
      <button class="btn btn-primary">Normal</button>
      <button class="btn btn-primary" disabled>Disabled</button>
      <button class="btn btn-success">Normal</button>
      <button class="btn btn-success" disabled>Disabled</button>
    </div>
  </section>

</body>
</html>
