











<!DOCTYPE html>
<html>
<head>
    <title>CSS Basics</title>

    <style>
       body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #3498db; /* Blue background */
    font-family: Arial, sans-serif;
}

        h1 {
            font-family: Arial, sans-serif;
        }

        .rounded-image {
            width: 150px;
            height: 150px;
            overflow: hidden;   /* Clip image */
            border-radius: 50%; /* Make it circle */
            margin-top: 20px;
        }

        .rounded-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;  /* Prevent stretching */
        }
    </style>
</head>

<body>

    <h1>Welcome to CS 311 - Web Programming</h1>

    <div class="rounded-image">
        <img src="University ID.jpg" alt="My Photo">
    </div>

</body>
</html>
